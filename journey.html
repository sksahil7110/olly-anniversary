<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Journey ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
linear-gradient(
135deg,
#0f172a,
#581c87,
#ec4899
);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Sparkles */

.sparkle{
position:absolute;
color:white;
font-size:18px;
animation:twinkle linear infinite;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
transform:scale(.5);
}
50%{
opacity:1;
transform:scale(1.3);
}
}

/* Flower */

.flower{
position:relative;
width:350px;
height:350px;
display:flex;
justify-content:center;
align-items:center;
animation:flowerAppear 2s ease forwards;
}

@keyframes flowerAppear{
from{
transform:scale(0);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.petal{
position:absolute;
width:120px;
height:180px;
border-radius:60px 60px 0 0;

background:
linear-gradient(
180deg,
#fff8dc,
#ffd6e8,
#ff69b4
);

transform-origin:bottom center;

opacity:0;

animation:bloom 2s forwards;
}

@keyframes bloom{
from{
transform:scale(0);
opacity:0;
}
to{
opacity:1;
}
}

.p1{
transform:rotate(0deg) translateY(-80px);
animation-delay:.2s;
}

.p2{
transform:rotate(45deg) translateY(-80px);
animation-delay:.4s;
}

.p3{
transform:rotate(90deg) translateY(-80px);
animation-delay:.6s;
}

.p4{
transform:rotate(135deg) translateY(-80px);
animation-delay:.8s;
}

.p5{
transform:rotate(180deg) translateY(-80px);
animation-delay:1s;
}

.p6{
transform:rotate(225deg) translateY(-80px);
animation-delay:1.2s;
}

.p7{
transform:rotate(270deg) translateY(-80px);
animation-delay:1.4s;
}

.p8{
transform:rotate(315deg) translateY(-80px);
animation-delay:1.6s;
}

.center{
width:90px;
height:90px;
background:#ffd700;
border-radius:50%;
box-shadow:
0 0 40px gold,
0 0 80px gold;
z-index:5;
}

/* Text */

.message{
position:absolute;
bottom:140px;
width:90%;
max-width:700px;
text-align:center;
color:white;
font-size:1.4rem;
line-height:1.8;
opacity:0;
animation:showText 2s forwards 3.5s;
}

@keyframes showText{
to{
opacity:1;
}
}

/* Door */

.door{
position:absolute;
bottom:-250px;

width:160px;
height:240px;

border-radius:15px;

background:
linear-gradient(
180deg,
#ffd700,
#d4af37
);

box-shadow:
0 0 30px gold,
0 0 60px rgba(255,215,0,.5);

cursor:pointer;

transition:.5s;

display:flex;
justify-content:center;
align-items:center;

font-weight:bold;
color:#5b3a00;

animation:doorRise 2s forwards 6s;
}

@keyframes doorRise{
to{
bottom:40px;
}
}

.door:hover{
transform:scale(1.08);
box-shadow:
0 0 50px gold,
0 0 100px gold;
}

/* Glow */

.glow{
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:
radial-gradient(
circle,
rgba(255,215,0,.25),
transparent 70%
);

animation:pulse 4s infinite;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.15);
}
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="flower">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>
<div class="petal p6"></div>
<div class="petal p7"></div>
<div class="petal p8"></div>

<div class="center"></div>

</div>

<div class="message" id="message">
</div>

<div class="door"
onclick="window.location.href='gifts.html'">
✨ Enter The Treasure Room ✨
</div>

<script>

/* Sparkles */

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.style.animationDuration=
(2+Math.random()*4)+"s";

document.body.appendChild(s);
}

/* Typing Effect */

const text=
"For Two Years... ❤️<br><br>We laughed.<br>We cried.<br>We stayed.<br><br>And every memory led here.";

let i=0;

function type(){

if(i<text.length){

document.getElementById("message").innerHTML=
text.substring(0,i);

i++;

setTimeout(type,45);

}

}

setTimeout(type,3500);

</script>

</body>
</html>
