<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Journey ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Fade In */

body{
animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

/* Petals */

.petal{
position:absolute;
font-size:32px;
animation:fall linear infinite;
opacity:.9;
}

@keyframes fall{

0%{
transform:translateY(-150px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:
translateY(120vh)
rotate(360deg);

opacity:0;
}

}

/* Center Card */

.card{

position:relative;
z-index:5;

width:90%;
max-width:700px;

padding:40px;

text-align:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

border-radius:30px;

box-shadow:0 0 40px rgba(255,255,255,.1);

}

/* Title */

.title{

font-size:3rem;

color:#f8d87c;

margin-bottom:20px;

opacity:0;

animation:
slideUp 1.5s forwards 2s;

}

.text{

font-size:1.3rem;

line-height:1.8;

color:white;

opacity:0;

animation:
slideUp 1.5s forwards 3.2s;

}

.btn{

margin-top:35px;

padding:18px 50px;

border:none;

border-radius:50px;

font-size:1rem;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
45deg,
#f8d87c,
#ffd700
);

opacity:0;

animation:
slideUp 1.5s forwards 4.5s;

}

@keyframes slideUp{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Flower Border */

.borderFlower{

position:absolute;

font-size:42px;

opacity:.8;

animation:pulse 3s infinite;

}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

}

</style>
</head>

<body>

<div class="borderFlower" style="top:20px;left:20px;">🌹</div>
<div class="borderFlower" style="top:20px;right:20px;">🌸</div>
<div class="borderFlower" style="bottom:20px;left:20px;">🌺</div>
<div class="borderFlower" style="bottom:20px;right:20px;">🌷</div>

<div class="card">

<h1 class="title">
The Treasure Room ✨
</h1>

<div class="text">
A collection of moments,<br>
memories and emotions<br>
carefully gathered over<br>
730 unforgettable days.
</div>

<button class="btn"
onclick="window.location.href='gifts.html'">
Open The Treasure Room ❤️
</button>

</div>

<script>

/* Falling Flowers */

const flowers=[
"🌹","🌸","🌺","🌷","💮"
];

for(let i=0;i<60;i++){

let petal=
document.createElement("div");

petal.className="petal";

petal.innerHTML=
flowers[
Math.floor(
Math.random()*flowers.length
)
];

petal.style.left=
Math.random()*100+"vw";

petal.style.animationDuration=
(8+Math.random()*10)+"s";

petal.style.animationDelay=
Math.random()*8+"s";

document.body.appendChild(petal);

}

</script>

</body>
</html>
