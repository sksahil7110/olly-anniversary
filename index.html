<!DOCTYPE html>
<html>
<head>
<title>Olly ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to bottom,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
text-align:center;
color:white;
}

.teddy{
font-size:100px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

h1{
font-size:32px;
margin:10px;
}

p{
font-size:18px;
max-width:300px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4f81;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="teddy">🧸</div>

<h1>Hello Olly ❤️</h1>

<p>
I've been collecting treasures from the last 730 days.
Today I'd like to show them to you.
</p>

<button onclick="alert('Welcome to our adventure ❤️')">
Begin Journey
</button>

</body>

</html>
