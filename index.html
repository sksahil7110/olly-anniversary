<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Olly ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#081229,#162447,#2c3e70);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
color:white;
}

/* STARS */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* CLOUDS */

.cloud{
position:absolute;
font-size:90px;
opacity:.18;
animation:moveCloud 45s linear infinite;
}

@keyframes moveCloud{
from{
transform:translateX(-300px);
}
to{
transform:translateX(calc(100vw + 300px));
}
}

/* HEARTS */

.heart{
position:absolute;
font-size:22px;
animation:floatHeart 12s linear infinite;
opacity:.7;
}

@keyframes floatHeart{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120px);
}
}

/* MAIN CONTENT */

.container{
position:relative;
z-index:20;
width:90%;
max-width:500px;
}

.teddy{
font-size:220px;
animation:float 3s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(255,255,255,.4));
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-18px);
}
}

.title{
font-size:48px;
font-weight:700;
margin-top:-10px;
text-shadow:0 0 20px rgba(255,255,255,.6);
}

#message{
margin-top:20px;
font-size:24px;
line-height:1.6;
min-height:120px;
padding:0 10px;
}

.door{
font-size:130px;
margin-top:10px;
display:none;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
100%{
transform:scale(1);
}
}

button{
display:none;
margin-top:20px;
padding:18px 40px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:white;
color:#ff4f81;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,.4);
}

button:hover{
transform:scale(1.05);
}

.footer{
margin-top:15px;
font-size:13px;
opacity:.75;
}

</style>
</head>

<body>

<div class="container">

<div class="teddy">🧸</div>

<div class="title">Olly ❤️</div>

<div id="message"></div>

<div class="door" id="door">
🚪✨
</div>

<button id="startBtn"
onclick="window.location.href='gifts.html'">
Open The Treasure Room ❤️
</button>

<div class="footer">
730 Days • Countless Memories
</div>

</div>

<script>

/* STARS */

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.classList.add("star");

let size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*4+"s";

document.body.appendChild(star);

}

/* CLOUDS */

for(let i=0;i<8;i++){

let cloud=document.createElement("div");

cloud.classList.add("cloud");

cloud.innerHTML="☁️";

cloud.style.top=(Math.random()*80)+"%";

cloud.style.left=(-300-Math.random()*500)+"px";

cloud.style.animationDuration=
(40+Math.random()*20)+"s";

cloud.style.animationDelay=
(-Math.random()*50)+"s";

document.body.appendChild(cloud);

}

/* HEARTS */

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(8+Math.random()*8)+"s";

heart.style.animationDelay=
Math.random()*8+"s";

document.body.appendChild(heart);

}

/* STORY */

const messages=[

"Hello Olly ❤️",

"Two years ago... something beautiful began.",

"For 730 unforgettable days...",

"I've been protecting memories, laughter, and love.",

"Tonight I want to show you something special.",

"20 treasures collected from our story.",

"Are you ready to open them?"
];

let current=0;

function typeText(text,callback){

let i=0;

document.getElementById("message").innerHTML="";

let interval=setInterval(()=>{

document.getElementById("message").innerHTML += text.charAt(i);

i++;

if(i>=text.length){

clearInterval(interval);

setTimeout(callback,1800);

}

},55);

}

function nextMessage(){

if(current<messages.length){

typeText(messages[current],()=>{

current++;

nextMessage();

});

}
else{

document.getElementById("door").style.display="block";

document.getElementById("startBtn").style.display="inline-block";

}

}

nextMessage();

</script>

</body>
</html>
