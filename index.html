<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Olly ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(
180deg,
#081229,
#132c57,
#2d3f8c
);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Stars */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
}
50%{
opacity:1;
}
}

/* Clouds */

.cloud{
position:absolute;
font-size:120px;
opacity:.18;
animation:floatCloud 20s linear infinite;
}

@keyframes floatCloud{
from{
transform:translateX(-300px);
}
to{
transform:translateX(calc(100vw + 300px));
}
}

/* Main Card */

.hero{
position:relative;
z-index:5;
text-align:center;
padding:40px;
width:90%;
max-width:700px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
border-radius:35px;
box-shadow:0 0 40px rgba(255,255,255,.08);
}

/* Teddy */

.teddy-wrap{
position:relative;
height:180px;
}

.teddy{
font-size:130px;
position:absolute;
left:-1000px;
animation: walkIn 3s ease forwards;
}

.teddy:hover{
animation: wave 1s infinite;
}

@keyframes walkIn{
0%{
left:-1000px;
}
100%{
left:50%;
transform:translateX(-50%);
}
}

@keyframes wave{
0%,100%{
transform:translateX(-50%) rotate(0deg);
}
50%{
transform:translateX(-50%) rotate(10deg);
}
}

/* Title */

.title{
font-size:4rem;
color:white;
font-weight:700;
margin-top:20px;

opacity:0;
animation:fadeIn 1s ease forwards 2.8s;
text-shadow:
0 0 20px rgba(255,255,255,.5),
0 0 40px rgba(255,105,180,.4);
}

.subtitle{
margin-top:20px;
font-size:1.3rem;
line-height:1.8;
color:white;
opacity:.9;

opacity:0;
animation:fadeIn 1s ease forwards 3.5s;
}

.enter-btn{
margin-top:35px;
padding:18px 50px;
font-size:1.1rem;
font-weight:600;
border:none;
border-radius:50px;
cursor:pointer;
background:white;
color:#ff4d88;
transition:.4s;

opacity:0;
animation:fadeIn 1s ease forwards 4.2s;
}

.enter-btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,105,180,.7);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Floating Hearts */

.heart{
position:absolute;
font-size:24px;
color:pink;
animation:floatHeart linear infinite;
opacity:.7;
}

@keyframes floatHeart{
from{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

/* Footer */

.footer{
margin-top:25px;
color:rgba(255,255,255,.75);
font-size:.95rem;
opacity:0;
animation:fadeIn 1s ease forwards 4.8s;
}

</style>
</head>

<body>

<!-- Clouds -->
<div class="cloud" style="top:8%;animation-duration:35s;">☁️</div>
<div class="cloud" style="top:25%;animation-duration:40s;">☁️</div>
<div class="cloud" style="top:70%;animation-duration:45s;">☁️</div>
<div class="cloud" style="top:55%;animation-duration:30s;">☁️</div>

<!-- Hero -->
<div class="hero">

<div class="teddy-wrap">
<div class="teddy">🧸</div>
</div>

<h1 class="title">
Welcome, Olly ❤️
</h1>

<p class="subtitle">
Two years ago, our story began.<br>
Tonight, Teddy has something special to show you.<br>
A collection of moments, memories and love from the last 730 days.
</p>

<button class="enter-btn"
onclick="window.location.href='journey.html'>
Begin Our Journey ✨
</button>

<div class="footer">
Made with ❤️ for our 2nd Anniversary
</div>

</div>

<script>

/* Stars */

for(let i=0;i<180;i++){

let star=document.createElement("div");
star.className="star";

let size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDuration=
(Math.random()*4+2)+"s";

document.body.appendChild(star);
}

/* Hearts */

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*10+8)+"s";

heart.style.animationDelay=
Math.random()*8+"s";

document.body.appendChild(heart);
}

</script>

</body>
</html>
