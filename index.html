<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Olly ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#07111f,#12233f,#213e68);
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

/* STARS */

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:.8;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
50%{opacity:.2;}
}

/* CLOUDS */

.cloud{
position:absolute;
font-size:120px;
opacity:.12;
animation:cloudMove 60s linear infinite;
}

@keyframes cloudMove{
from{
transform:translateX(-400px);
}
to{
transform:translateX(calc(100vw + 400px));
}
}

/* TEDDY SCENE */

.scene{
position:relative;
z-index:10;
text-align:center;
width:90%;
max-width:650px;
}

.teddy-container{
position:relative;
height:320px;
}

.cloud-base{
font-size:180px;
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
filter:blur(1px);
}

.teddy{
position:absolute;
width:220px;
left:-350px;
bottom:60px;
animation:arrive 4s ease forwards;
}

@keyframes arrive{
to{
left:50%;
transform:translateX(-50%);
}
}

/* TEXT */

.text{
margin-top:20px;
font-size:30px;
font-weight:300;
min-height:120px;
line-height:1.6;
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:4s;
}

@keyframes fadeIn{
to{
opacity:1;
}
}

.line{
display:none;
margin-bottom:10px;
}

/* BUTTON */

.button{
display:none;
margin-top:30px;
padding:18px 42px;
background:white;
color:#ff4d88;
border:none;
border-radius:50px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,.3);
transition:.3s;
}

.button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="scene">

<div class="teddy-container">

<div class="cloud-base">☁️</div>

<img src="teddy.png" class="teddy">

</div>

<div class="text" id="textBox"></div>

<button class="button" id="enterBtn"
onclick="window.location.href='gifts.html'">
Enter Our Story ❤️
</button>

</div>

<script>

/* STARS */

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.classList.add("star");

let size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(star);

}

/* CLOUDS */

for(let i=0;i<8;i++){

let cloud=document.createElement("div");

cloud.classList.add("cloud");

cloud.innerHTML="☁️";

cloud.style.top=Math.random()*80+"%";

cloud.style.left="-300px";

cloud.style.animationDuration=
(40+Math.random()*40)+"s";

cloud.style.animationDelay=
(-Math.random()*50)+"s";

document.body.appendChild(cloud);

}

/* STORY */

const lines=[

"Hello Olly ❤️",

"I've been waiting for you.",

"Two years ago,",

"a beautiful chapter began.",

"And tonight...",

"I'd like to show you",

"some treasures from our story."

];

let index=0;

function showNextLine(){

if(index<lines.length){

let box=document.getElementById("textBox");

let p=document.createElement("div");

p.className="line";

p.innerText=lines[index];

box.appendChild(p);

p.style.display="block";

p.animate([
{opacity:0,transform:"translateY(20px)"},
{opacity:1,transform:"translateY(0)"}
],{
duration:1200,
fill:"forwards"
});

index++;

setTimeout(showNextLine,1800);

}else{

document.getElementById("enterBtn")
.style.display="inline-block";

}

}

setTimeout(showNextLine,5000);

</script>

</body>
</html>
